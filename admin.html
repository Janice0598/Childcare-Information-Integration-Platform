<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>托育資訊整合平台 - 管理員後台</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: #f5f5f5; color: #333; }
        .admin-layout { display: flex; min-height: 100vh; }
        .sidebar { width: 250px; background-color: #333; color: #fff; display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; font-size: 18px; font-weight: bold; border-bottom: 1px solid #555; text-align: center; background-color: #222; }
        .sidebar-menu { list-style: none; flex-grow: 1; }
        .sidebar-menu li { padding: 15px 20px; border-bottom: 1px solid #444; cursor: pointer; color: #ccc; }
        .sidebar-menu li:hover, .sidebar-menu li.active { background-color: #555; color: #fff; font-weight: bold; }
        .sidebar-footer { padding: 20px; border-top: 1px solid #555; text-align: center; }
        .main-content { flex-grow: 1; display: flex; flex-direction: column; }
        .top-header { height: 60px; background-color: #fff; border-bottom: 2px solid #ccc; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; }
        .dashboard-content { padding: 30px; overflow-y: auto; }
        .page-title { margin-bottom: 20px; color: #333; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background-color: #fff; border: 2px solid #ccc; padding: 20px; text-align: center; }
        .stat-value { font-size: 28px; font-weight: bold; margin-top: 10px; color: #555; }
        .dashboard-panels { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; }
        .panel { background-color: #fff; border: 2px solid #ccc; padding: 20px; }
        .panel-title { font-size: 18px; margin-bottom: 15px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .wireframe-btn { display: block; width: 100%; padding: 10px; margin-bottom: 10px; border: 2px solid #666; background-color: #fff; cursor: pointer; font-weight: bold; color: #333; text-align: center; }
        .wireframe-btn.primary { background-color: #666; color: #fff; }
        .data-list { width: 100%; border-collapse: collapse; }
        .data-list th, .data-list td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        .data-list th { background-color: #f9f9f9; color: #666; }

        /* 照片上傳區塊 */
        .upload-section { background: #fff; border: 2px solid #ccc; padding: 25px; margin-top: 30px; }
        .upload-section h3 { margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        .form-label { display: block; font-weight: bold; margin-bottom: 6px; font-size: 14px; }
        .form-input { width: 100%; padding: 8px 12px; border: 2px solid #ccc; font-size: 14px; }
        .photo-preview-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 15px; }
        .photo-preview-item { position: relative; height: 120px; background: #eaeaea; border: 1px dashed #999; overflow: hidden; }
        .photo-preview-item img { width: 100%; height: 100%; object-fit: cover; }
        .photo-preview-item .delete-btn { position: absolute; top: 5px; right: 5px; background: #ef4444; color: white; border: none; padding: 3px 8px; cursor: pointer; font-size: 12px; font-weight: bold; }
        .photo-caption { font-size: 12px; color: #666; padding: 4px 6px; background: rgba(255,255,255,0.9); position: absolute; bottom: 0; left: 0; right: 0; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }
    </style>
</head>
<body>

    <div class="admin-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="index.html" style="text-decoration:none; color:#fff;">托育整合平台</a>
            </div>
            <ul class="sidebar-menu">
                <li class="active" onclick="showSection('dashboard')">📊 儀表板首頁</li>
                <li onclick="showSection('photos')">🖼️ 設施照片管理</li>
            </ul>
            <div class="sidebar-footer">
                <button class="wireframe-btn" onclick="logout()">登出系統</button>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div id="admin-center-display">目前管理機構：<strong>載入中...</strong></div>
                <div id="admin-name-display">👤 載入中... 您好</div>
            </header>

            <div class="dashboard-content">

                <!-- 儀表板 -->
                <div id="section-dashboard">
                    <h1 class="page-title">機構營運概況</h1>
                    <div class="stats-grid">
                        <div class="stat-card"><div>開放招生名額</div><div class="stat-value" id="stat-slots">-</div></div>
                        <div class="stat-card"><div>目前候補人數</div><div class="stat-value" id="stat-waitlist">-</div></div>
                        <div class="stat-card"><div>現職教職員數</div><div class="stat-value" id="stat-staff">-</div></div>
                        <div class="stat-card"><div>最新評鑑等級</div><div class="stat-value" id="stat-eval">-</div></div>
                    </div>

                    <div class="dashboard-panels">
                        <div class="panel">
                            <h2 class="panel-title">快速操作</h2>
                            <button class="wireframe-btn primary" onclick="showSection('photos')">🖼️ 管理設施照片</button>
                        </div>
                        <div class="panel">
                            <h2 class="panel-title">資料維護狀態</h2>
                            <table class="data-list">
                                <thead>
                                    <tr><th>資料類型</th><th>最後更新時間</th><th>狀態</th></tr>
                                </thead>
                                <tbody>
                                    <tr><td>基本資料</td><td>2026-04-15</td><td>✅ 完整</td></tr>
                                    <tr><td>招生狀態</td><td>2026-04-28</td><td>⚠️ 開放中</td></tr>
                                    <tr><td>政府評鑑</td><td>2025-11-20</td><td>✅ 已建檔</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- 照片管理 -->
                <div id="section-photos" style="display:none;">
                    <h1 class="page-title">🖼️ 設施照片管理</h1>

                    <!-- 上傳新照片 -->
                    <div class="upload-section">
                        <h3>上傳新照片</h3>
                        <div class="form-group">
                            <label class="form-label">照片說明（選填）</label>
                            <input type="text" id="upload-caption" class="form-input" placeholder="例如：戶外遊戲區">
                        </div>
                        <div class="form-group">
                            <label class="form-label">選擇圖片</label>
                            <input type="file" id="upload-file" accept="image/*" class="form-input">
                        </div>
                        <button class="wireframe-btn primary" style="width:auto; padding: 10px 30px;" onclick="uploadPhoto()">📤 上傳照片</button>
                        <div id="upload-result" style="margin-top:10px; color:#666; font-size:14px;"></div>
                    </div>

                    <!-- 現有照片列表 -->
                    <div class="upload-section" style="margin-top:20px;">
                        <h3>現有設施照片</h3>
                        <div class="photo-preview-grid" id="existing-photos">
                            <div style="color:#999; font-size:14px;">載入中...</div>
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const API_BASE = 'http://localhost:3000/api';
        const SUPABASE_URL = 'https://rfzavcliggzlpkqqcrzr.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJmemF2Y2xpZ2d6bHBrcXFjcnpyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNzY1NjUsImV4cCI6MjA5MjY1MjU2NX0.PAPu8svIFjvDXUfY91yXGIRmktBCKExsOnqxlYW0z_I';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentCenterId = null;

        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }

        function showSection(name) {
            document.getElementById('section-dashboard').style.display = name === 'dashboard' ? 'block' : 'none';
            document.getElementById('section-photos').style.display = name === 'photos' ? 'block' : 'none';
            if (name === 'photos' && currentCenterId) loadPhotos();
        }

        async function loadAdminData() {
            const userId = localStorage.getItem('loggedInUserId');
            const userRole = localStorage.getItem('userRole');

            if (!userId || userRole !== 'admin') {
                alert('請先登入管理員帳號！');
                window.location.href = 'login.html';
                return;
            }

            document.getElementById('admin-name-display').innerText =
                `👤 ${localStorage.getItem('loggedInUserName') || '管理員'} 您好`;

            // 用 centeraccount_id 去查詢對應的 childcare_center
            try {
                const { data: centerData } = await supabaseClient
                    .from('childcare_center')
                    .select('center_id, name')
                    .eq('centeraccount_id', userId)
                    .single();

                if (centerData) {
                    currentCenterId = centerData.center_id;
                    document.getElementById('admin-center-display').innerHTML =
                        `目前管理機構：<strong>${centerData.name}</strong>`;

                    // 載入招生狀態數據
                    const { data: enrollment } = await supabaseClient
                        .from('enrollment_status')
                        .select('*')
                        .eq('center_id', currentCenterId)
                        .single();

                    if (enrollment) {
                        document.getElementById('stat-slots').innerText = enrollment.availability_slots ?? '-';
                        document.getElementById('stat-waitlist').innerText = enrollment.waitlist_count ?? '-';
                    }

                    // 載入師資數量
                    const { count: staffCount } = await supabaseClient
                        .from('staff')
                        .select('*', { count: 'exact', head: true })
                        .eq('center_id', currentCenterId);
                    document.getElementById('stat-staff').innerText = staffCount ?? '-';

                    // 載入最新評鑑
                    const { data: evalData } = await supabaseClient
                        .from('evaluation_record')
                        .select('evalution_result')
                        .eq('center_id', currentCenterId)
                        .order('completion_date', { ascending: false })
                        .limit(1)
                        .single();
                    document.getElementById('stat-eval').innerText = evalData?.evalution_result ?? '-';

                } else {
                    document.getElementById('admin-center-display').innerHTML =
                        `目前管理機構：<strong>尚未綁定機構</strong>`;
                }
            } catch (err) {
                console.error('載入管理員資料失敗：', err);
            }
        }

        // 載入現有照片
        async function loadPhotos() {
            if (!currentCenterId) return;
            try {
                const response = await fetch(`${API_BASE}/photo/center/${currentCenterId}`);
                const result = await response.json();
                const photos = result.data;

                const grid = document.getElementById('existing-photos');

                if (!photos || photos.length === 0) {
                    grid.innerHTML = '<div style="color:#999; font-size:14px;">尚無照片</div>';
                    return;
                }

                grid.innerHTML = photos.map(p => `
                    <div class="photo-preview-item">
                        <img src="${p.url}" alt="${p.caption || '設施照片'}">
                        <div class="photo-caption">${p.caption || '（無說明）'}</div>
                        <button class="delete-btn" onclick="deletePhoto(${p.photo_id})">✕</button>
                    </div>
                `).join('');
            } catch (err) {
                console.error('載入照片失敗：', err);
            }
        }

        // 上傳照片
        async function uploadPhoto() {
            if (!currentCenterId) {
                alert('尚未綁定機構，無法上傳照片！');
                return;
            }

            const fileInput = document.getElementById('upload-file');
            const caption = document.getElementById('upload-caption').value;
            const resultDiv = document.getElementById('upload-result');

            if (!fileInput.files[0]) {
                alert('請先選擇要上傳的圖片！');
                return;
            }

            resultDiv.innerText = '⏳ 上傳中，請稍候...';

            const formData = new FormData();
            formData.append('photoblob', fileInput.files[0]);
            formData.append('center_id', currentCenterId);
            formData.append('caption', caption);

            try {
                const response = await fetch(`${API_BASE}/photo/upload`, {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (!response.ok || !result.success) {
                    throw new Error(result.error || '上傳失敗');
                }

                resultDiv.innerText = '✅ 上傳成功！';
                fileInput.value = '';
                document.getElementById('upload-caption').value = '';
                loadPhotos(); // 重新載入照片列表

            } catch (err) {
                console.error('上傳失敗：', err);
                resultDiv.innerText = '❌ 上傳失敗：' + err.message;
            }
        }

        // 刪除照片
        async function deletePhoto(photoId) {
            if (!confirm('確定要刪除這張照片嗎？')) return;

            try {
                const response = await fetch(`${API_BASE}/photo/${currentCenterId}/${photoId}`, {
                    method: 'DELETE'
                });

                const result = await response.json();

                if (!response.ok || !result.success) {
                    throw new Error(result.error || '刪除失敗');
                }

                alert('✅ 照片已刪除！');
                loadPhotos(); // 重新載入照片列表

            } catch (err) {
                console.error('刪除失敗：', err);
                alert('❌ 刪除失敗：' + err.message);
            }
        }

        loadAdminData();
    </script>
</body>
</html>
