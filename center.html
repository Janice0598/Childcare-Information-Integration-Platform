<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>搜尋機構 - 托育資訊整合平台</title>
    <!-- 引入我們寫好的精緻版 CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ========================================== -->
    <!-- 1. 頂部導覽列 (Navbar)                         -->
    <!-- ========================================== -->
    <header class="navbar">
        <a href="index.html" style="text-decoration: none;">
            <div class="logo-placeholder">托育整合平台</div>
        </a>
        <div class="nav-actions">
            <!-- 根據需求，這裡放會員中心或登入的連結 -->
            <a href="login.html" class="wireframe-btn" style="text-decoration: none;">家長登入</a>
            <a href="user-dashboard.html" class="wireframe-btn primary" style="text-decoration: none;">我的會員區</a>
        </div>
    </header>

    <!-- ========================================== -->
    <!-- 2. 主要搜尋頁面內容 (Search Page Main)          -->
    <!-- ========================================== -->
    <main id="search-page">
        <!-- 頂部：搜尋摘要與關鍵字快搜 -->
        <div class="search-header">
            <div class="search-summary">
                <h2>尋找適合的托育機構</h2>
                <p class="text-line">透過左側面板設定您的篩選條件，我們會為您即時更新結果。</p>
            </div>
            <div class="quick-search">
                <input type="text" id="keyword-search" class="wireframe-input" placeholder="輸入機構名稱關鍵字...">
                <button class="wireframe-btn primary">搜尋</button>
            </div>
        </div>

        <div class="search-layout">
<!-- 左側：進階篩選器 -->
            <aside class="filter-sidebar">
                <h3 class="filter-title">進階篩選</h3>

                <!-- 1. 機構類型 -->
                <div class="filter-group">
                    <label class="filter-label" for="filter-category">機構類型</label>
                    <select id="filter-category" class="wireframe-input full-width">
                        <option value="不限">不限類型</option>
                        <option value="托嬰中心">托嬰中心</option>
                        <option value="幼兒園">幼兒園</option>
                        <option value="托兒所">托兒所</option>
                    </select>
                </div>

                <!-- 2. 營運屬性 -->
                <div class="filter-group">
                    <label class="filter-label" for="filter-operation">營運屬性</label>
                    <select id="filter-operation" class="wireframe-input full-width">
                        <option value="不限">不限屬性</option>
                        <option value="公立">公立</option>
                        <option value="私立">私立</option>
                    </select>
                </div>

                <!-- 3. 所在地區 -->
                <div class="filter-group">
                    <label class="filter-label" for="filter-district">所在地區</label>
                    <select id="filter-district" class="wireframe-input full-width">
                        <option value="不限">全台北市 (不限地區)</option>
                        <option value="內湖區">內湖區</option>
                        <option value="大安區">大安區</option>
                        <option value="信義區">信義區</option>
                        <option value="中山區">中山區</option>
                        <option value="松山區">松山區</option>
                        <option value="中正區">中正區</option>
                        <option value="萬華區">萬華區</option>
                        <option value="大同區">大同區</option>
                        <option value="南港區">南港區</option>
                        <option value="文山區">文山區</option>
                        <option value="士林區">士林區</option>
                        <option value="北投區">北投區</option>
                    </select>
                </div>

                <!-- 4. 師生比 -->
                <div class="filter-group">
                    <label class="filter-label" for="filter-ratio">師生比上限</label>
                    <select id="filter-ratio" class="wireframe-input full-width">
                        <option value="不限">不限</option>
                        <option value="1:1">1:1</option>
                        <option value="1:2">1:2</option>
                        <option value="1:3">1:3</option>
                        <option value="1:4">1:4</option>
                        <option value="1:5">1:5</option>
                    </select>
                </div>

                <!-- 5. 營業時間 (開門與關門) -->
                <div class="filter-group">
                    <label class="filter-label">配合接送時間</label>
                    <div style="display: flex; gap: 10px; margin-bottom: 8px;">
                        <select id="filter-open-time" class="wireframe-input" style="flex: 1;">
                            <option value="不限">開門時間</option>
                            <option value="06:00">06:00 前</option>
                            <option value="07:00">07:00 前</option>
                            <option value="08:00">08:00 前</option>
                            <option value="09:00">09:00 前</option>
                            <option value="10:00">10:00 前</option>
                        </select>
                        <select id="filter-close-time" class="wireframe-input" style="flex: 1;">
                            <option value="不限">關門時間</option>
                            <option value="15:00">15:00 後</option>
                            <option value="16:00">16:00 後</option>
                            <option value="17:00">17:00 後</option>
                            <option value="18:00">18:00 後</option>
                            <option value="19:00">19:00 後</option>
                            <option value="20:00">20:00 後</option>
                            <option value="21:00">21:00 後</option>
                            <option value="22:00">22:00 後</option>
                        </select>
                    </div>
                </div>

                <!-- 6. 總收托容量 -->
                <div class="filter-group">
                    <label class="filter-label" for="filter-capacity">機構總容量</label>
                    <select id="filter-capacity" class="wireframe-input full-width">
                        <option value="不限">不限規模</option>
                        <option value="1-15">1 - 15 人</option>
                        <option value="16-30">16 - 30 人</option>
                        <option value="31-45">31 - 45 人</option>
                        <option value="46-60">46 - 60 人</option>
                    </select>
                </div>

                <button id="applyFilterBtn" class="wireframe-btn primary full-width">套用篩選條件</button>
                <button id="resetFilterBtn" class="wireframe-btn full-width" style="margin-top: 10px;">清除條件</button>
            </aside>

            <!-- 右側：搜尋結果列表 -->
            <section class="results-container">
                <div class="results-meta">
                    <span>找到 <strong id="result-count">0</strong> 間符合條件的機構</span>
                    <select class="wireframe-input" style="padding: 6px 12px;">
                        <option>預設排序</option>
                        <option>月費由低到高</option>
                        <option>評價由高到低</option>
                    </select>
                </div>

                <!-- 這裡是你 JS 會把 Supabase 資料塞進來的地方 -->
                <div id="results-list" class="results-list">
                    <!-- 預設顯示的空狀態 -->
                    <div class="empty-state">
                        請點選左側「套用篩選條件」來載入機構資料。
                    </div>
                </div>
            </section>
        </div>
    </main>

    <!-- ========================================== -->
    <!-- 3. 載入 JavaScript 與 Supabase 邏輯             -->
    <!-- ========================================== -->
    <!-- 引入 Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- 引入你寫好的搜尋邏輯 (確保你把這個檔案也上傳到同一個資料夾) -->
    <script src="search.js"></script>
</body>
</html>
