<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>托育資訊整合平台登入</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container {
            min-height: calc(100vh - 70px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-card {
            background-color: #fff;
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border: 1px solid #ccc;
        }

        .auth-title {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        .auth-links {
            margin-top: 16px;
            text-align: center;
            font-size: 14px;
            color: #666;
        }

        .auth-links a {
            color: #444;
            text-decoration: none;
            font-weight: bold;
        }

        .auth-links a:hover {
            text-decoration: underline;
        }

        .divider {
            border: none;
            border-top: 1px solid #eee;
            margin: 16px 0;
        }
    </style>
</head>
<body>

    <header class="navbar">
        <a href="index.html" style="text-decoration: none;">
            <div class="logo-placeholder">托育整合平台</div>
        </a>
    </header>

    <main class="auth-container">
        <div class="auth-card">
            <h2 class="auth-title">會員登入</h2>

            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="role">登入身分</label>
                    <select id="role" class="wireframe-input full-width">
                        <option value="parent">家長</option>
                        <option value="admin">機構管理員</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">電子郵件 (Email)</label>
                    <input type="email" id="email" class="wireframe-input full-width"
                        required placeholder="user@example.com">
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">密碼 (Password)</label>
                    <input type="password" id="password" class="wireframe-input full-width"
                        required placeholder="輸入密碼">
                </div>

                <button type="submit" class="wireframe-btn primary full-width">登入</button>
            </form>

            <!-- 家長註冊連結 -->
            <div class="auth-links">
                還沒有帳號嗎？ <a href="register.html">家長立即註冊</a>
            </div>

            <hr class="divider">

            <!-- 管理員註冊連結 -->
            <div class="auth-links">
                機構管理員？ <a href="admin-register.html">建立管理員帳號</a>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
</body>
</html>
