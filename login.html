<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>托育資訊整合平台登入</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container {
            min-height: calc(100vh - 70px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-card {
            background-color: var(--surface-color);
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-light);
        }

        .auth-title {
            text-align: center;
            margin-bottom: 30px;
            color: var(--primary-color);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-main);
            font-size: 14px;
        }

        .auth-links {
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
        }
        
        .auth-links a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <header class="navbar">
        <a href="index.html" style="text-decoration: none;">
            <div class="logo-placeholder">托育整合平台</div>
        </a>
    </header>

    <main class="auth-container">
        <div class="auth-card">
            <h2 class="auth-title">會員登入</h2>
            
            <!-- 登入表單 -->
            <form id="loginForm">
                    <div class="form-group">
                        <label class="form-label" for="role">登入身分</label>
                        <select id="role" class="wireframe-input full-width">
                            <option value="parent">家長</option>
                            <option value="admin">平台管理員</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">電子郵件 (Email)</label>
                    <input type="email" id="email" class="wireframe-input full-width" required placeholder="user@example.com">
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="password">密碼 (Password)</label>
                    <input type="password" id="password" class="wireframe-input full-width" required placeholder="輸入密碼">
                </div>

                <button type="submit" class="wireframe-btn primary full-width">登入</button>
            </form>

            <div class="auth-links">
                還沒有帳號嗎？ <a href="register.html">立即註冊</a>
            </div>
        </div>
    </main>
<!-- 1. 先引入 Supabase 官方套件 (這行非常重要，一定要在 auth.js 前面！) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- 2. 再引入你自己寫的登入邏輯 -->
    <script src="auth.js"></script>
</body>
</html>
