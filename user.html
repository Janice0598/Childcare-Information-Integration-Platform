<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>托育資訊整合平台 - 家長會員中心</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 針對會員中心的特定排版 (可加在原本的 style.css 底下) */
        .user-layout {
            display: flex;
            max-width: 1200px;
            margin: 40px auto;
            gap: 30px;
            padding: 0 20px;
        }

        /* 會員側邊欄 */
        .user-sidebar {
            width: 250px;
            background-color: #fff;
            border: 2px solid #ccc;
            height: fit-content;
        }

        .user-profile-summary {
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid #eee;
        }

        .avatar-placeholder {
            width: 80px;
            height: 80px;
            background-color: #ccc;
            border-radius: 50%;
            margin: 0 auto 10px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
        }

        .user-menu {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .user-menu li {
            border-bottom: 1px solid #eee;
        }

        .user-menu a {
            display: block;
            padding: 15px 20px;
            text-decoration: none;
            color: #333;
            font-weight: bold;
        }

        .user-menu a:hover, .user-menu a.active {
            background-color: #eaeaea;
            border-left: 4px solid #666;
        }

        /* 主內容區 */
        .user-main {
            flex-grow: 1;
        }

        .welcome-header {
            margin-bottom: 30px;
            padding-bottom: 10px;
            border-bottom: 2px solid #ccc;
        }

        /* 摘要數據卡片 */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .summary-card {
            background-color: #fff;
            border: 2px solid #ccc;
            padding: 20px;
            text-align: center;
        }

        .summary-number {
            font-size: 32px;
            font-weight: bold;
            color: #666;
            margin-top: 10px;
        }

        /* 個人化推薦區塊 */
        .recommendation-section {
            background-color: #fff;
            border: 2px dashed #999;
            padding: 20px;
        }
    </style>
</head>
<body>

    <!-- 頂部導覽列 (登入後狀態) -->
    <header class="navbar">
        <div class="logo-placeholder">托育整合平台</div>
        <div class="nav-actions">
            <span>👋 你好，家長</span>
            <button class="wireframe-btn">回首頁</button>
            <button class="wireframe-btn primary">登出</button>
        </div>
    </header>

    <!-- 會員中心主結構 -->
    <div class="user-layout">
        
        <!-- 左側選單 (對應你提供的 Sitemap) -->
       <aside class="user-sidebar">
            <div class="user-profile-summary">
                <div class="avatar-placeholder">大頭貼</div>
                <!-- 加上 id="user-name-display" -->
                <h3 id="user-name-display">載入中...</h3> 
                <!-- 加上 id="user-email-display" -->
                <div id="user-email-display" class="text-line">載入中...</div>
            </div>
            <ul class="user-menu">
                <li><a href="#" class="active">會員首頁概況</a></li>
                <li><a href="#">👤 個人資料設定</a></li>
                <li><a href="#">📁 我的收藏資料夾</a></li>
                <li><a href="#">📝 我的評鑑紀錄</a></li>
            </ul>
        </aside>

        <!-- 右側主要內容區 -->
        <main class="user-main">
            <div class="welcome-header" style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ccc; padding-bottom: 15px; margin-bottom: 20px;">
                <h2 style="margin: 0;">會員總覽</h2>
                <a href="search.html" class="wireframe-btn primary" style="width: auto; margin: 0; padding: 8px 20px; text-decoration: none; display: inline-block; font-size: 14px;">
                    🔍 開始搜尋托育機構
                </a>
            </div>

            <!-- 數據總覽 -->
            <div class="summary-grid">
                <div class="summary-card">
                    <div>建立的收藏資料夾</div>
                    <div class="summary-number">3</div>
                </div>
                <div class="summary-card">
                    <div>已收藏的機構數</div>
                    <div class="summary-number">12</div>
                </div>
                <div class="summary-card">
                    <div>已發布的評鑑</div>
                    <div class="summary-number">2</div>
                </div>
            </div>

            <!-- 專案文件提到的：客製化推薦區塊 (Personalised Recommendation) -->
            <div class="recommendation-section">
                <h3 style="margin-bottom: 15px;">✨ 專屬您的托育機構推薦</h3>
                <p class="text-line" style="margin-bottom: 20px;">根據您設定的偏好（內湖區、月費 20,000 以內、需延托服務），我們為您推薦以下機構：</p>
                
                <div class="grid-container recommendations" style="grid-template-columns: repeat(2, 1fr);">
                    <!-- 推薦卡片 1 -->
                    <div class="card-placeholder">
                        <div class="image-placeholder" style="height: 100px;">機構圖片</div>
                        <div class="text-line thick">████托嬰中心</div>
                        <div class="text-line thin">評鑑優等 | 距離 1.2km</div>
                    </div>
                    <!-- 推薦卡片 2 -->
                    <div class="card-placeholder">
                        <div class="image-placeholder" style="height: 100px;">機構圖片</div>
                        <div class="text-line thick">████幼兒園</div>
                        <div class="text-line thin">評鑑甲等 | 距離 2.5km</div>
                    </div>
                </div>
                <button class="wireframe-btn full-width" style="margin-top: 20px;">更新我的偏好設定 (Update Settings)</button>
            </div>

        </main>
    </div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="user.js"></script>
</body>
</html>
