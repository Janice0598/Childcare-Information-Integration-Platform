<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家長註冊 - 托育資訊整合平台</title>
    <link rel="stylesheet" href="style.css">
    <!-- 沿用登入頁面的置中卡片樣式 -->
    <style>
        .auth-container {
            min-height: calc(100vh - 70px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-card {
            background-color: #fff;
            width: 100%;
            max-width: 450px; /* 註冊欄位較多，卡片稍微加寬一點 */
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border: 1px solid #ccc;
        }

        .auth-title {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        .auth-links {
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
        }
        
        .auth-links a {
            color: #666;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header class="navbar">
        <a href="index.html" style="text-decoration: none;">
            <div class="logo-placeholder">托育整合平台</div>
        </a>
    </header>

    <main class="auth-container">
        <div class="auth-card">
            <h2 class="auth-title">家長會員註冊</h2>
            
            <!-- 註冊表單 -->
            <form id="registerForm">
                <div class="form-group">
                    <label class="form-label" for="name">家長姓名 (Name)</label>
                    <input type="text" id="name" class="wireframe-input full-width" required placeholder="例如：王小明">
                </div>

                <div class="form-group">
                    <label class="form-label" for="phone">聯絡電話 (Phone)</label>
                    <input type="tel" id="phone" class="wireframe-input full-width" required placeholder="例如：0912345678">
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">電子郵件 (Email)</label>
                    <input type="email" id="email" class="wireframe-input full-width" required placeholder="user@example.com">
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="password">設定密碼 (Password)</label>
                    <input type="password" id="password" class="wireframe-input full-width" required placeholder="請設定 6 碼以上密碼">
                </div>

                <div class="form-group">
                    <label class="form-label" for="confirmPassword">確認密碼 (Confirm Password)</label>
                    <input type="password" id="confirmPassword" class="wireframe-input full-width" required placeholder="請再次輸入密碼">
                </div>

                <button type="submit" class="wireframe-btn primary full-width">立即註冊</button>
            </form>

            <div class="auth-links">
                已經有帳號了？ <a href="login.html">返回登入</a>
            </div>
        </div>
    </main>

    <!-- 1. 引入 Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- 2. 引入註冊用的 JS -->
    <script src="register.js"></script>
</body>
</html>
